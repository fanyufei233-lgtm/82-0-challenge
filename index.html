<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>82-0 完美赛季大挑战</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(#1a0033, #000); color: #fff; margin:0; padding:0; text-align:center; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 3.5em; margin: 20px 0; text-shadow: 0 0 20px gold; }
    .subtitle { font-size: 1.4em; margin-bottom: 30px; }
    button { 
        background: linear-gradient(#ff9800, #f57c00); color: white; border: none; 
        padding: 15px 40px; font-size: 1.3em; margin: 15px; border-radius: 50px; cursor: pointer;
    }
    button:hover { transform: scale(1.05); }
    .player-pool { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 30px 0; }
    .player-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
    .player-card:hover { background: rgba(255,215,0,0.3); transform: scale(1.05); }
    .player-card.disabled { opacity: 0.6; cursor: not-allowed; }
    .selected { border: 3px solid gold; background: rgba(255,215,0,0.2); }
    .lineup { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 40px 0; }
    .player-slot { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; min-width: 160px; }
    .result { font-size: 2.8em; margin: 30px 0; color: gold; line-height: 1.4; }
</style>
</head>
<body>
<div class="container">
    <h1>82 <span style="color:#ffd700;">胜</span> 0</h1>
    <p class="subtitle">完美赛季大挑战</p>
    <p>随机球队 · 随机年代 · 五次机会<br>谁能打造出最强82-0阵容？</p>

    <button onclick="startGame()">🎮 开始游戏</button>
    <button onclick="showRules()">📜 玩法说明</button>

    <div id="game" style="display:none;">
        <h2 id="roundTitle">第 <span id="round">1</span>/5 轮 - <span id="position">控球后卫</span></h2>
        
        <div class="player-pool" id="pool"></div>
        
        <div style="margin-top:30px;">
            <button onclick="nextRound()" id="nextBtn" style="display:none;">✅ 确认选择 → 下一轮</button>
        </div>

        <div id="lineupSection" style="display:none; margin-top:40px;">
            <h2>你的最终阵容</h2>
            <div class="lineup" id="lineup"></div>
            <div class="result" id="result"></div>
            <button onclick="restartGame()">🔄 再来一次</button>
        </div>
    </div>
</div>

<script>
// ==================== 球员数据库 ====================
const playersDB = {
    "PG": [
        {name:"魔术师约翰逊", team:"洛杉矶湖人", era:"1980s", rating:97, historical: true},
        {name:"斯蒂芬·库里", team:"金州勇士", era:"2010s", rating:96, historical: true},
        {name:"卢卡·东契奇", team:"洛杉矶湖人", era:"2025-26", rating:94},
        {name:"谢伊·吉尔杰斯-亚历山大", team:"俄克拉荷马雷霆", era:"2025-26", rating:95},
        {name:"凯德·坎宁安", team:"底特律活塞", era:"2025-26", rating:92},
        {name:"特雷·杨", team:"华盛顿奇才", era:"2025-26", rating:90},
        {name:"贾·莫兰特", team:"孟菲斯灰熊", era:"2025-26", rating:88},
        {name:"达隆·福克斯", team:"圣安东尼奥马刺", era:"2025-26", rating:85}
    ],
    "SG": [
        {name:"迈克尔·乔丹", team:"芝加哥公牛", era:"1990s", rating:98, historical: true},
        {name:"科比·布莱恩特", team:"洛杉矶湖人", era:"2000s", rating:97, historical: true},
        {name:"杰伦·布朗", team:"波士顿凯尔特人", era:"2025-26", rating:96},
        {name:"安东尼·爱德华兹", team:"明尼苏达森林狼", era:"2025-26", rating:95},
        {name:"多诺万·米切尔", team:"克利夫兰骑士", era:"2025-26", rating:94},
        {name:"德文·布克", team:"菲尼克斯太阳", era:"2025-26", rating:93},
        {name:"杰伦·格林", team:"菲尼克斯太阳", era:"2025-26", rating:89},
        {name:"乔丹·普尔", team:"新奥尔良鹈鹕", era:"2025-26", rating:85}
    ],
    "SF": [
        {name:"勒布朗·詹姆斯", team:"迈阿密热火", era:"2010s", rating:97, historical: true},
        {name:"凯文·杜兰特", team:"俄克拉荷马雷霆", era:"2010s", rating:96, historical: true},
        {name:"杰森·塔图姆", team:"波士顿凯尔特人", era:"2025-26", rating:93},
        {name:"科怀·伦纳德", team:"洛杉矶快船", era:"2025-26", rating:92},
        {name:"杰伦·约翰逊", team:"亚特兰大老鹰", era:"2025-26", rating:90},
        {name:"迈卡尔·布里奇斯", team:"纽约尼克斯", era:"2025-26", rating:88},
        {name:"保罗·乔治", team:"费城76人", era:"2025-26", rating:87},
        {name:"保罗·班切罗", team:"奥兰多魔术", era:"2025-26", rating:85}
    ],
    "PF": [
        {name:"扬尼斯·安特托孔波", team:"密尔沃基雄鹿", era:"2020s", rating:96, historical: true},
        {name:"蒂姆·邓肯", team:"圣安东尼奥马刺", era:"2000s", rating:97, historical: true},
        {name:"尼古拉·约基奇", team:"丹佛掘金", era:"2025-26", rating:95},
        {name:"斯科蒂·巴恩斯", team:"多伦多猛龙", era:"2025-26", rating:92},
        {name:"阿尔佩伦·申京", team:"休斯顿火箭", era:"2025-26", rating:91},
        {name:"切特·霍姆格伦", team:"俄克拉荷马雷霆", era:"2025-26", rating:89},
        {name:"帕斯卡尔·西亚卡姆", team:"印第安纳步行者", era:"2025-26", rating:88},
        {name:"弗朗茨·瓦格纳", team:"奥兰多魔术", era:"2025-26", rating:85}
    ],
    "C": [
        {name:"沙奎尔·奥尼尔", team:"洛杉矶湖人", era:"2000s", rating:98, historical: true},
        {name:"威尔特·张伯伦", team:"费城76人", era:"1960s", rating:99, historical: true},
        {name:"维克托·文班亚马", team:"圣安东尼奥马刺", era:"2025-26", rating:96},
        {name:"乔尔·恩比德", team:"费城76人", era:"2025-26", rating:93},
        {name:"安东尼·戴维斯", team:"华盛顿奇才", era:"2025-26", rating:92},
        {name:"卡尔-安东尼·唐斯", team:"纽约尼克斯", era:"2025-26", rating:94},
        {name:"德安德烈·艾顿", team:"洛杉矶湖人", era:"2025-26", rating:88},
        {name:"伊维察·祖巴茨", team:"印第安纳步行者", era:"2025-26", rating:85}
    ]
};

let currentRound = 0;
let selectedPlayers = [];
let isSelecting = false;   // 防止重复点击

const positions = ["PG", "SG", "SF", "PF", "C"];
const posNames = {PG:"控球后卫", SG:"得分后卫", SF:"小前锋", PF:"大前锋", C:"中锋"};

function startGame() {
    selectedPlayers = [];
    currentRound = 0;
    isSelecting = false;
    document.getElementById('game').style.display = 'block';
    document.getElementById('lineupSection').style.display = 'none';
    document.getElementById('lineup').innerHTML = '';
    nextRound();
}

function nextRound() {
    currentRound++;
    if (currentRound > 5) {
        showResult();
        return;
    }
    
    document.getElementById('round').textContent = currentRound;
    document.getElementById('position').textContent = posNames[positions[currentRound-1]];
    
    const pos = positions[currentRound-1];
    const poolDiv = document.getElementById('pool');
    poolDiv.innerHTML = '';
    isSelecting = true;
    
    let pool = [...playersDB[pos]];
    pool.sort((a, b) => {
        const aWeight = a.historical ? 0.25 : 1;
        const bWeight = b.historical ? 0.25 : 1;
        return Math.random() * bWeight - Math.random() * aWeight;
    });
    pool = pool.slice(0, 3);
    
    pool.forEach(player => {
        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
            <strong>${player.name}</strong><br>
            ${player.team} ${player.era}<br>
            <small>能力值：${player.rating}</small>
        `;
        card.onclick = () => selectPlayer(player, card, pos);
        poolDiv.appendChild(card);
    });
    
    document.getElementById('nextBtn').style.display = 'none';
}

function selectPlayer(player, card, pos) {
    if (!isSelecting || selectedPlayers.length >= 5) return;
    
    selectedPlayers.push({ ...player, position: posNames[pos], posKey: pos });
    
    // 高亮选中
    document.querySelectorAll('.player-card').forEach(c => {
        c.classList.remove('selected');
        c.classList.add('disabled');
        c.onclick = null;   // 禁用所有点击
    });
    card.classList.add('selected');
    
    if (currentRound === 5) {
        isSelecting = false;
        setTimeout(showResult, 500);
    } else {
        document.getElementById('nextBtn').style.display = 'inline-block';
    }
}

function calculateChemistry() {
    let chemistry = 0;
    if (selectedPlayers.some(p => (p.posKey === "PG" || p.posKey === "SG") && p.rating >= 95)) chemistry += 3;
    if (selectedPlayers.some(p => (p.posKey === "PF" || p.posKey === "C") && p.rating >= 95)) chemistry += 3;
    if (selectedPlayers.some(p => p.rating >= 96)) chemistry += 4;
    return chemistry;
}

function showResult() {
    const lineupDiv = document.getElementById('lineup');
    lineupDiv.innerHTML = '';
    
    selectedPlayers.slice(0, 5).forEach(p => {
        const div = document.createElement('div');
        div.className = 'player-slot';
        div.innerHTML = `<strong>${p.position}</strong><br>${p.name}<br><small>${p.team} • ${p.rating}</small>`;
        lineupDiv.appendChild(div);
    });
    
    const avgRating = selectedPlayers.reduce((sum, p) => sum + p.rating, 0) / 5;
    const chemistry = calculateChemistry();
    const randomness = Math.random() * 12 - 8;
    let wins = Math.floor(avgRating * 0.68 + chemistry + randomness);
    wins = Math.max(52, Math.min(82, wins));
    const losses = 82 - wins;
    
    const comment = wins >= 78 ? "🏆 接近完美！极罕见" :
                    wins >= 74 ? "🔥 顶级强队表现" :
                    wins >= 68 ? "👍 还算不错" : "阵容较弱，继续加油！";
    
    document.getElementById('result').innerHTML = `
        模拟战绩：<br>
        <span style="font-size:2.8em;">${wins} - ${losses}</span><br>
        <span style="font-size:1.2em;">${comment}</span>
    `;
    document.getElementById('lineupSection').style.display = 'block';
}

function restartGame() {
    document.getElementById('lineupSection').style.display = 'none';
    document.getElementById('game').style.display = 'none';
    startGame();
}

function showRules() {
    alert("🎯 规则：\n1. 每轮只能选择1名球员\n2. 第5轮选择后自动显示最终结果");
}
</script>
</body>
</html>
